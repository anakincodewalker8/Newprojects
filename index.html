<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs - Research Paper</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon-7.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">⚡ ASA CREATIONS</div>
        <nav>
            <input type="text" id="searchBar" placeholder="SYSTEM SEARCH...">
        </nav>
    </header>

    <main class="game-container" id="gameGrid">
        <!-- Core modules automatically populated via JavaScript -->
    </main>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeBtn">&times;</span>
            <button id="fullscreenBtn" class="frame-btn">INITIALIZE FULLSCREEN</button>
            <iframe id="gameFrame" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
