<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Diagnostics Console</title>
    <style>
        body {
            background-color: #05050a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #console-log {
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00ffcc;
        }
        canvas {
            border: 2px solid #ff0055;
            background-color: #0a0a14;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            cursor: none;
        }
        .controls-tip {
            margin-top: 15px;
            font-size: 12px;
            color: #ff0055;
        }
    </style>
</head>
<body>

    <div id="console-log">SYS.LOC: MOCO_SECTOR_INIT // SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="controls-tip">USE YOUR MOUSE TO MOVE PADDLE // DEFLECT THE DATA NODES</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        
        // Ball configuration
        let ball = { x: 300, y: 200, dx: 4, dy: -4, radius: 8 };
        
        // Paddle configuration
        let paddle = { width: 100, height: 12, x: 250 };

        // Track mouse movement over canvas
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.width / 2;
            
            // Keep paddle inside canvas boundaries
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x > canvas.width - paddle.width) paddle.x = canvas.width - paddle.width;
        });

        function update() {
            // Move Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall Collisions (Left/Right)
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.dx *= -1;
            }

            // Ceiling Collision
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Paddle Collision Detection
            if (ball.y + ball.radius >= canvas.height - paddle.height - 10) {
                if (ball.x >= paddle.x && ball.x <= paddle.x + paddle.width) {
                    ball.dy = -Math.abs(ball.dy) * 1.05; // Deflect and speed up slightly
                    score += 10;
                    scoreElement.innerText = score;
                }
            }

            // Reset condition if ball drops past paddle
            if (ball.y - ball.radius > canvas.height) {
                score = 0;
                scoreElement.innerText = score;
                ball.x = 300;
                ball.y = 200;
                ball.dx = 4;
                ball.dy = -4;
            }
        }

        function draw() {
            // Clear Frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Vector Target Node (Ball)
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffcc';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffcc';
            ctx.fill();
            ctx.closePath();

            // Draw Deflector Shield (Paddle)
            ctx.fillStyle = '#ff0055';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0055';
            ctx.fillRect(paddle.x, canvas.height - paddle.height - 10, paddle.width, paddle.height);
            
            // Reset shadow specs for performance optimization
            ctx.shadowBlur = 0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Start the application process loop
        loop();
    </script>
</body>
</html>
